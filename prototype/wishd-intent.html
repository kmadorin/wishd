<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wishd — defi by wishing it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Caveat:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #FBF4E8;
  --bg-2:     #F4EAD5;
  --surface:  #FFFCF3;
  --surface-2:#FFFFFF;
  --ink:      #1F1B16;
  --ink-2:    #5A4F40;
  --ink-3:    #9A8E78;
  --accent:   #E89A6B;
  --accent-2: #FFD9C2;
  --mint:     #B8E6C9;
  --mint-2:   #DCF1E2;
  --pink:     #F5C2C7;
  --warn:     #F5DC8A;
  --warn-2:   #FAEEBC;
  --good:     #9FD9B0;
  --bad:      #E89999;
  --rule:     #E5DAC0;
  --shadow:   rgba(31,27,22,0.08);
  --r-sm:     6px;
  --r:        12px;
  --r-lg:     20px;
  --r-pill:   999px;
}

html { background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; color: var(--ink); }
body {
  min-height: 100vh; position: relative; overflow-x: hidden;
  background:
    radial-gradient(circle at 12% 18%, rgba(232,154,107,0.07) 0, rgba(232,154,107,0.07) 280px, transparent 281px),
    radial-gradient(circle at 88% 78%, rgba(184,230,201,0.1) 0, rgba(184,230,201,0.1) 320px, transparent 321px),
    radial-gradient(circle at 50% 110%, rgba(245,220,138,0.08) 0, rgba(245,220,138,0.08) 380px, transparent 381px),
    var(--bg);
}

/* ── layout ── */
.page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 80px; }

/* ── header ── */
header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 0 18px;
  border-bottom: 1.5px dashed var(--rule);
  margin-bottom: 28px;
}
.logo { font-family: 'Caveat', cursive; font-size: 38px; font-weight: 700; color: var(--ink); line-height: 1; letter-spacing: -0.5px; }
.logo-dot { display: inline-block; width: 9px; height: 9px; background: var(--accent); border: 2px solid var(--ink); border-radius: 50%; margin-left: 2px; vertical-align: middle; }
.tagline { font-size: 13px; color: var(--ink-3); margin-left: 2px; }
.wallet-pill {
  margin-left: auto;
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px 6px 6px;
  border: 1.5px solid var(--ink); border-radius: var(--r-pill);
  background: var(--surface);
  box-shadow: 2px 2px 0 var(--ink);
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
}
.wallet-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--mint); border: 1.5px solid var(--ink); }
.wallet-addr { font-weight: 500; }
.wallet-chain { color: var(--ink-3); font-size: 11px; }

/* ── step card ── */
.step-card {
  background: var(--surface);
  border: 2px solid var(--ink);
  border-radius: 22px;
  padding: 20px 24px 22px;
  margin-bottom: 0;
  box-shadow: 4px 4px 0 var(--ink);
  animation: fadeUp 0.25s ease forwards;
  position: relative;
}
.step-card.locked {
  opacity: 0.92;
  box-shadow: 4px 4px 0 var(--ink);
}
.step-card.locked .step-body { pointer-events: none; }
#stepsContainer { display: flex; flex-direction: column; gap: 24px; }

.step-head {
  display: flex; align-items: baseline; gap: 12px;
  margin-bottom: 4px;
}
.step-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.1em;
  background: var(--bg-2); color: var(--ink);
  border: 1.5px solid var(--ink);
  padding: 3px 7px; border-radius: 5px;
  flex-shrink: 0;
}
.step-title {
  font-family: 'Caveat', cursive;
  font-size: 32px; font-weight: 700;
  line-height: 1.1;
  flex: 1;
}
.step-status {
  font-size: 12px; color: var(--ink-3);
  font-style: italic; flex-shrink: 0;
}
.step-status.edit-btn {
  cursor: pointer; font-size: 12px; font-style: normal;
  text-decoration: none; color: var(--ink-2);
  border: 1.5px solid var(--ink); border-radius: 999px;
  padding: 4px 12px; background: var(--bg);
}
.step-sub { font-size: 13.5px; color: var(--ink-2); margin-top: 4px; margin-bottom: 14px; }

/* ── sentence box ── */
.sentence-box {
  border: 2px dashed var(--ink);
  border-radius: 16px;
  padding: 18px;
  display: flex; flex-wrap: wrap; align-items: center; gap: 14px 12px;
  margin-bottom: 14px;
  background: var(--surface-2);
}
.sentence-prefix { font-family: 'Caveat', cursive; font-size: 28px; color: var(--ink); white-space: nowrap; }

/* action pill / dropdown */
.action-trigger {
  position: relative;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--accent); color: var(--ink);
  border: 2px solid var(--ink); border-radius: var(--r-pill);
  padding: 3px 14px;
  font-family: 'Caveat', cursive;
  font-size: 16px; font-weight: 600;
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: background 0.15s;
}
.action-trigger:hover { background: #d4885a; }
.action-trigger.empty { background: var(--surface-2); color: var(--ink-3); }
.action-trigger svg { width: 12px; height: 12px; }

.action-dropdown {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--surface-2); border: 2px solid var(--ink);
  border-radius: var(--r); box-shadow: 4px 4px 0 var(--ink);
  min-width: 280px; z-index: 100; overflow: hidden;
  animation: fadeUp 0.15s ease;
}
.dropdown-header {
  padding: 8px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-3);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center; gap: 8px;
}
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--rule);
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover, .dropdown-item.hovered { background: var(--accent-2); }
.dropdown-icon {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1.5px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
  background: var(--surface);
}
.dropdown-name { font-weight: 600; font-size: 14px; }
.dropdown-desc { font-size: 12px; color: var(--ink-3); }

/* field pills */
.field-amount {
  display: inline-flex; align-items: center;
  border: 2px dashed var(--ink); border-radius: var(--r-pill);
  background: transparent; overflow: hidden;
  padding: 3px 14px;
}
.field-amount input {
  background: transparent; border: none; outline: none;
  font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700;
  color: var(--ink); padding: 0; width: 90px; text-align: center;
}
.field-asset {
  display: inline-flex; align-items: center; gap: 6px;
  border: 2px solid var(--ink); border-radius: var(--r-pill);
  padding: 3px 14px;
  font-family: 'Caveat', cursive;
  font-weight: 600; font-size: 16px; cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
}
.field-asset:hover { opacity: 0.8; }
.field-asset.from { background: var(--accent); }
.field-asset.to   { background: var(--mint); }
.field-asset.chain { background: var(--mint); }
.field-asset.protocol { background: var(--bg-2); }
.field-asset.mint { background: var(--mint); }
.pill-wrap { position: relative; display: inline-flex; }
.pill-dd {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  min-width: 260px; padding: 6px; border-radius: 14px;
}
.pill-dd .pdd-header {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px; color: var(--ink-3);
  text-transform: uppercase; letter-spacing: 0.08em;
  padding: 4px 8px 6px;
}
.pill-dd .pdd-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 10px; border-radius: 8px;
  cursor: pointer; font-size: 14px; min-height: 44px;
  border-bottom: none;
}
.pill-dd .pdd-row:hover, .pill-dd .pdd-row.hovered { background: var(--accent-2); }
.pill-dd .pdd-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.pill-dd .pdd-ticker { font-weight: 700; font-size: 14px; color: var(--ink); }
.pill-dd .pdd-name { font-weight: 400; color: var(--ink-3); font-size: 14px; margin-left: 6px; }
.pill-dd .pdd-bal { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--ink-2); }
.asset-dot {
  width: 26px; height: 26px; border-radius: 50%;
  border: 1.5px solid var(--ink);
  display: inline-grid; place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.7px; font-weight: 700; flex: 0 0 auto;
}
.asset-dot.eth  { background: #C9D4F5; }
.asset-dot.usdc { background: #C2D7F0; }
.asset-dot.dai  { background: #FAE5B0; }
.asset-dot.wbtc { background: #FAD4A8; }
.asset-dot.usdt { background: #B0DFCB; }
.asset-dot.arb  { background: #BAD9F7; }
.asset-dot.default { background: var(--bg-2); }

.connector { font-size: 14px; color: var(--ink-3); }

/* balance / quick chips */
.balance-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; color: var(--ink-3); }
.quick-chip {
  padding: 2px 10px; border: 1.5px solid var(--rule); border-radius: var(--r-pill);
  font-size: 12px; cursor: pointer; background: var(--surface-2);
  transition: all 0.12s;
}
.quick-chip:hover { border-color: var(--accent); background: var(--accent-2); color: var(--ink); }

/* AI bubble */
.ai-bubble { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px; }
.ai-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--mint); border: 1.5px solid var(--ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; color: var(--ink);
}
.ai-msg {
  flex: 1; background: var(--surface-2);
  border: 1.5px solid var(--rule); border-radius: 0 var(--r) var(--r) var(--r);
  padding: 10px 14px; font-size: 14px; line-height: 1.5;
}
.ai-msg strong { font-weight: 700; }

/* thinking dots */
.thinking { display: flex; align-items: center; gap: 8px; padding: 8px 0; color: var(--ink-3); font-size: 13px; }
.dots span {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; background: var(--accent);
  animation: blink 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.2s; }
.dots span:nth-child(3) { animation-delay: 0.4s; }

/* example pills */
.examples-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; align-items: center; }
.examples-label { font-size: 13px; color: var(--ink-3); }
.ex-pill {
  padding: 5px 12px; border: 1.5px solid var(--rule); border-radius: var(--r-pill);
  font-size: 12px; cursor: pointer; background: var(--surface-2); color: var(--ink-2);
  transition: all 0.12s;
}
.ex-pill:hover, .ex-pill.active { border-color: var(--ink); background: var(--accent-2); color: var(--ink); }

/* primary / secondary buttons */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 22px; border-radius: var(--r-pill);
  font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 600;
  cursor: pointer; border: 2px solid var(--ink); transition: all 0.15s;
  outline: none;
}
.btn:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; }
.btn-primary { background: var(--accent); color: var(--ink); box-shadow: 3px 3px 0 var(--ink); }
.btn-primary:hover { background: #d4885a; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
.btn-ghost { background: transparent; color: var(--ink-2); border-color: var(--rule); }
.btn-ghost:hover { border-color: var(--ink); color: var(--ink); }
.btn-mint { background: var(--mint); color: var(--ink); }
.btn-mint:hover { background: #99d4b4; }
.btn-full { width: 100%; justify-content: center; font-size: 17px; padding: 13px; }
.btn-sm { padding: 7px 14px; font-size: 13px; box-shadow: 2px 2px 0 var(--ink); }

.hint { font-size: 12px; color: var(--ink-3); margin-top: 8px; text-align: center; }

/* ── STEP 02 two-column ── */
.step2-layout { display: grid; grid-template-columns: 1fr 280px; gap: 16px; align-items: start; }
@media (max-width: 680px) { .step2-layout { grid-template-columns: 1fr; } }

/* widget card */
.widget-card {
  background: var(--surface-2); border: 2px solid var(--ink);
  border-radius: 18px; overflow: hidden;
  box-shadow: 3px 3px 0 var(--ink);
}
.widget-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--rule);
}
.widget-name { font-family: 'Caveat', cursive; font-size: 20px; font-weight: 700; }
.widget-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  border: 1px solid var(--rule); border-radius: var(--r-sm);
  padding: 2px 7px; color: var(--ink-3);
}
.pay-section { background: var(--accent-2); padding: 14px 16px; }
.receive-section { background: var(--mint-2); padding: 14px 16px; }
.box-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; color: var(--ink-2); margin-bottom: 6px; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
.box-amount { font-family: 'Caveat', cursive; font-size: 38px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.box-usd { font-size: 12px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; }
.box-asset { display: inline-flex; align-items: center; gap: 5px; background: var(--surface-2); border: 1.5px solid var(--ink); border-radius: var(--r-pill); padding: 4px 10px; font-weight: 700; font-size: 14px; float: right; }
.box-max { font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; }
.box-row { display: flex; align-items: flex-end; justify-content: space-between; }
.swap-dir {
  display: flex; justify-content: center; align-items: center;
  padding: 8px; background: var(--surface-2);
  border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
}
.swap-dir-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1.5px solid var(--ink); background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; transition: all 0.15s;
}
.swap-dir-btn:hover { background: var(--accent-2); transform: rotate(180deg); }
.stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--rule);
}
.stat-cell {
  padding: 10px 14px; border-right: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
}
.stat-cell:nth-child(even) { border-right: none; }
.stat-cell:nth-last-child(-n+2) { border-bottom: none; }
.stat-k { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 3px; }
.stat-v { font-family: 'Caveat', cursive; font-size: 17px; font-weight: 700; }
.widget-cta { padding: 14px 16px; border-top: 1px solid var(--rule); }

/* lend widget extras */
.apy-row { display: flex; gap: 8px; padding: 14px 16px; background: var(--bg); border-bottom: 1px solid var(--rule); }
.apy-stat { flex: 1; text-align: center; }
.apy-val { font-family: 'Caveat', cursive; font-size: 22px; font-weight: 700; color: var(--ink); }
.apy-key { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 2px; text-transform: uppercase; }
.amount-section { padding: 14px 16px; border-bottom: 1px solid var(--rule); }
.amount-wrap { position: relative; margin-bottom: 8px; }
.amount-big {
  font-family: 'Caveat', cursive; font-size: 36px; font-weight: 700;
  background: none; border: none; border-bottom: 2px dashed var(--rule);
  outline: none; width: 100%; color: var(--ink); padding-bottom: 4px;
}
.slider { width: 100%; accent-color: var(--accent); margin-top: 8px; }
.yield-preview { font-size: 13px; color: var(--ink-3); padding: 10px 16px; border-bottom: 1px solid var(--rule); }
.yield-val { color: var(--ink); font-weight: 600; }

/* vault list */
.vault-list { padding: 10px 16px; }
.vault-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border: 1.5px solid var(--rule);
  border-radius: var(--r-sm); margin-bottom: 8px; cursor: pointer;
  transition: all 0.12s; background: var(--surface-2);
}
.vault-row:hover { border-color: var(--accent); background: var(--accent-2); }
.vault-row.selected { border-color: var(--ink); background: var(--accent-2); }
.vault-name { font-weight: 600; font-size: 14px; flex: 1; }
.vault-apy { font-family: 'Caveat', cursive; font-size: 20px; font-weight: 700; color: var(--ink); }
.vault-sub { font-size: 11px; color: var(--ink-3); }
.vault-check { width: 18px; height: 18px; border: 1.5px solid var(--rule); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.vault-row.selected .vault-check { background: var(--ink); color: var(--surface); border-color: var(--ink); }

/* bridge widget */
.bridge-chains {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 10px; padding: 14px 16px;
  border-bottom: 1px solid var(--rule); background: var(--bg);
}
.chain-box { text-align: center; padding: 10px; background: var(--surface-2); border: 1px solid var(--rule); border-radius: var(--r-sm); }
.chain-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--ink-3); margin-bottom: 4px; text-transform: uppercase; }
.chain-name { font-weight: 600; font-size: 13px; }
.chain-arrow { font-size: 18px; color: var(--ink-3); }

/* borrow extras */
.health-row { display: flex; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--rule); background: var(--warn-2); }

/* ── AI check panel ── */
.ai-panel {
  border: 1.5px dashed var(--ink); border-radius: 16px;
  background: var(--bg); padding: 16px;
}
.ai-panel-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
.ai-live { color: var(--accent); font-size: 12px; font-style: italic; }
.ai-panel-sub { font-size: 12px; color: var(--ink-3); margin-bottom: 14px; }
.ai-section-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
.balance-change {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border: 1.5px dashed var(--rule);
  border-radius: var(--r-sm); margin-bottom: 6px; font-size: 13px;
}
.balance-change.out { background: #FDEAEA; border-color: var(--bad); }
.balance-change.in  { background: var(--mint-2); border-color: var(--mint); }
.bc-sign { font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.bc-token { flex: 1; font-weight: 500; }
.bc-amount { font-family: 'JetBrains Mono', monospace; font-weight: 500; font-size: 12px; }
.safety-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; margin-bottom: 7px; line-height: 1.4;
}
.safety-check {
  width: 18px; height: 18px; border-radius: 4px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.safety-check.ok   { background: var(--good); color: var(--ink); }
.safety-check.warn { background: var(--warn); color: var(--ink); }
.safety-check.bad  { background: var(--bad); color: var(--ink); }
.ai-divider { height: 1px; background: var(--rule); margin: 12px 0; }
.allowance-action { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }

/* ── STEP 03 execution ── */
.exec-steps { display: flex; flex-direction: column; gap: 0; }
.exec-step {
  display: grid; grid-template-columns: 32px 1fr auto;
  gap: 14px; align-items: center;
  padding: 12px 0; border-bottom: 1.5px solid var(--rule);
  opacity: 0.4; transition: opacity 0.2s;
}
.exec-step:last-child { border-bottom: none; }
.exec-step.active, .exec-step.done { opacity: 1; }
.exec-icon {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  border: 2px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-family: 'JetBrains Mono', monospace;
  transition: all 0.2s;
}
.exec-step.done .exec-icon  { background: var(--good); border-color: var(--ink); }
.exec-step.active .exec-icon { background: var(--accent-2); border-color: var(--accent); animation: pulse 1.4s ease infinite; }
.exec-info { flex: 1; }
.exec-title { font-weight: 600; font-size: 14px; font-family: 'Caveat', cursive; font-size: 17px; }

/* ═══════════════════════════════════════════════════════════ UTILS ═══ */
function assetDot(token) {
  const cls = ASSET_CLASS[token] || 'default';
  const sym = ASSET_SYM[token] || token[0];
  return `<div class="asset-dot ${cls}">${sym}</div>`;
}

function needsApproval(action, fields) {
  const f = fields;
  if (action==='swap')        return (f.assetIn||'ETH')!=='ETH';
  if (action==='lend')        return (f.asset||'USDC')!=='ETH';
  if (action==='borrow')      return (f.collateral||'USDC')!=='ETH';
  if (action==='earn')        return (f.asset||'USDC')!=='ETH';
  if (action==='bridge')      return (f.asset||'ETH')!=='ETH';
  if (action==='find-vault')  return (f.asset||'USDC')!=='ETH';
  return false;
}
function approvalAsset(action, fields) {
  const f = fields;
  if (action==='swap')   return f.assetIn   || 'USDC';
  if (action==='borrow') return f.collateral|| 'USDC';
  return f.asset || 'USDC';
}
function spenderFor(action) {

}
function hasAllowance(asset, spender) {
  try { return JSON.parse(localStorage.getItem('w_allowances')||'{}')[asset+':'+spender]===true; } catch(e){ return false; }
}
function setAllowance(asset, spender) {

}

/* ═══════════════════════════════════════════════════════════ STEPS ═══ */
function lockStep(n) {
  const card = document.getElementById('step'+n);
  if (!card) return;
  card.classList.add('locked');
  const st = card.querySelector('.step-status');
  if (st) { st.textContent='edit ✎'; st.classList.add('edit-btn'); st.onclick=()=>unlockStep(n); }
}
function unlockStep(n) {
  // Remove all steps after n
  for (let i=n+1; i<=4; i++) { const c=document.getElementById('step'+i); if(c) c.remove(); }
  state.currentStep=n;
  state.txRunning=false;
  state.usedPermit2=false;
  state.skipApproveStep=false;
  state.permissionGranted=false;
  if(n===1) setExamplesVisible(true);
  const card=document.getElementById('step'+n);
  if (card) {
    card.classList.remove('locked');
    const st=card.querySelector('.step-status');
    if(st){ st.textContent='in progress'; st.classList.remove('edit-btn'); st.onclick=null; }
  }
}

function appendStep(html, id) {
  const container = document.getElementById('stepsContainer');
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  const card = tmp.firstElementChild;
  container.appendChild(card);
  scrollTo(card);
}

/* ── action dropdown ── */
function toggleDropdown() {
  const dd=document.getElementById('actionDropdown');
  dd.style.display = dd.style.display==='none' ? 'block' : 'none';
}
document.addEventListener('click', e=>{
  document.querySelectorAll('.pill-wrap').forEach(pw=>{
    if(!pw.contains(e.target)) {
      const dd=pw.querySelector('.pill-dd');
      if(dd) dd.style.display='none';
    }
  });
  const wrap=document.getElementById('actionWrap');
  if(wrap && !wrap.contains(e.target)) {
    const dd=document.getElementById('actionDropdown');
    if(dd) dd.style.display='none';
  }
});

function setExamplesVisible(v) {
  const row=document.getElementById('examplesRow'); if(row) row.style.display=v?'flex':'none';
}

function selectAction(action) {
  document.getElementById('actionDropdown').style.display='none';
  state.action=action;
  state.fields={};
  setExamplesVisible(false);
  const t=document.getElementById('actionTrigger');
  t.classList.remove('empty');
  document.getElementById('actionLabel').textContent=ACTION_META[action].label;
  renderDynamicFields();
  updateAiBubble();
}

function ddHeader(n){ return `<div class="pdd-header">${n} matches · ↑↓ ↵</div>`; }

function assetPill(id, value, cls, fieldKey) {

       <span class="pdd-bal">${m.bal}</span>
     </div>`;
  }).join('');
  return `<span class="pill-wrap">
    <div class="field-asset ${cls}" onclick="event.stopPropagation();togglePicker('${id}')">
      ${assetDot(value)}<span id="${id}-label">${value}</span>
    </div>
    <div class="action-dropdown pill-dd" id="${id}-dd" style="display:none">${ddHeader(ASSETS.length)}${items}</div>
  </span>`;
}
function chainPill(id, value, fieldKey, cls) {
  cls = cls || 'chain';
  const items = CHAINS.map(opt=>
    `<div class="pdd-row" onclick="event.stopPropagation();pickValue('${id}','${fieldKey}','${opt}')">
       <span class="pdd-ticker">${opt}</span>
     </div>`).join('');

    <div class="field-asset ${cls}" onclick="event.stopPropagation();togglePicker('${id}')"><span id="${id}-label">${value}</span></div>
    <div class="action-dropdown pill-dd" id="${id}-dd" style="display:none">${ddHeader(CHAINS.length)}${items}</div>
  </span>`;
}
function protocolPill(id, value, type) {
  const opts = PROTOCOLS[type] || [];
  const items = opts.map(opt=>
    `<div class="pdd-row" onclick="event.stopPropagation();pickValue('${id}','protocol','${opt}')">
       <span class="pdd-ticker">${opt}</span>
     </div>`).join('');
  return `<span class="pill-wrap">
    <div class="field-asset protocol" onclick="event.stopPropagation();togglePicker('${id}')"><span id="${id}-label">${value}</span></div>
    <div class="action-dropdown pill-dd" id="${id}-dd" style="display:none">${ddHeader(opts.length)}${items}</div>
  </span>`;
}
function togglePicker(id) {
  document.querySelectorAll('.pill-dd').forEach(d=>{ if(d.id!==id+'-dd') d.style.display='none'; });

function pickValue(triggerId, fieldKey, value) {
  state.fields[fieldKey]=value;

function onFieldInput(key, val) {
  state.fields[key]=val;
  updateAiBubble();
  validateStep1();
}

function setQuick(pct) {
  const bal=0.842;
  const amt=(bal*pct).toFixed(4).replace(/\.?0+$/,'');
  state.fields.amount=amt;
  const inp=document.getElementById('f_amount');
  if(inp) inp.value=amt;
  updateAiBubble(); validateStep1();
}

function validateStep1() {
  const a=state.action, f=state.fields;
  let valid=false;
  if(a==='swap')        valid=parseFloat(f.amount)>0 && f.assetIn && f.assetOut && f.chain;
  else if(a==='lend')   valid=parseFloat(f.amount)>0 && f.asset && f.protocol && f.chain;
  else if(a==='borrow') valid=parseFloat(f.amount)>0 && f.asset && f.collateral && f.protocol && f.chain;
  else if(a==='earn')   valid=parseFloat(f.amount)>0 && f.asset && f.chain;
  else if(a==='bridge') valid=parseFloat(f.amount)>0 && f.asset && f.fromChain && f.toChain;
  else if(a==='find-vault') valid=f.asset && f.chain;
  const btn=document.getElementById('looksGoodBtn');
  if(btn) btn.disabled=!valid;
  return valid;
}

function updateAiBubble() {
  const valid = validateStep1();
  if(!valid) { const b=document.getElementById('aiBubble'); if(b) b.style.display='none'; return; }
  const bubble=document.getElementById('aiBubble');
  const msg=document.getElementById('aiMsgText');
  if(!bubble||!msg) return;
  bubble.style.display='flex';
  msg.innerHTML=(AI_MESSAGES[state.action]||AI_MESSAGES.swap)(state.fields);
}

function loadExample(id) {
  const eg=EXAMPLES.find(e=>e.id===id); if(!eg) return;
  document.querySelectorAll('.ex-pill').forEach(p=>p.classList.remove('active'));
  const pill=document.getElementById('ex-'+id); if(pill) pill.classList.add('active');
  state.action=eg.action;
  state.fields={...eg.fields};
  const t=document.getElementById('actionTrigger');
  if(t){ t.classList.remove('empty'); document.getElementById('actionLabel').textContent=ACTION_META[eg.action].label; }
  setExamplesVisible(false);
  renderDynamicFields();
  updateAiBubble();
}

}

function buildAiCheck(a, f) {
  const approval=needsApproval(a,f);
  const asset=approvalAsset(a,f);
  const spender=spenderFor(a);
  const approved=!approval||hasAllowance(asset,spender);

  // balance changes
  let changes='';
  if(a==='swap'){
    changes=`<div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">${f.assetIn||'ETH'}</span><span class="bc-amount">-${f.amount||0.1}</span></div>
    <div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">gas</span><span class="bc-amount">~-$1.53</span></div>
    <div class="balance-change in"><span class="bc-sign">+</span><span class="bc-token">${f.assetOut||'USDC'}</span><span class="bc-amount">+${((f.amount||0.1)*3120).toFixed(2)}</span></div>`;
  } else if(a==='lend'){
    changes=`<div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">${f.asset||'USDC'}</span><span class="bc-amount">-${f.amount||100}</span></div>
    <div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">gas</span><span class="bc-amount">~-$4.10</span></div>
    <div class="balance-change in"><span class="bc-sign">+</span><span class="bc-token">cUSDC</span><span class="bc-amount">+${((f.amount||100)/22.4).toFixed(4)}</span></div>`;
  } else if(a==='borrow'){
    changes=`<div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">gas</span><span class="bc-amount">~-$6.50</span></div>
    <div class="balance-change in"><span class="bc-sign">+</span><span class="bc-token">${f.asset||'ETH'}</span><span class="bc-amount">+${f.amount||0.05}</span></div>`;
  } else if(a==='earn'||a==='find-vault'){
    changes=`<div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">${f.asset||'USDC'}</span><span class="bc-amount">-${f.amount||500}</span></div>
    <div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">gas</span><span class="bc-amount">~-$5.80</span></div>
    <div class="balance-change in"><span class="bc-sign">+</span><span class="bc-token">vault shares</span><span class="bc-amount">+${f.amount||500}</span></div>`;
  } else if(a==='bridge'){
    changes=`<div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">${f.asset||'ETH'} (${f.fromChain||'Mainnet'})</span><span class="bc-amount">-${f.amount||0.05}</span></div>
    <div class="balance-change out"><span class="bc-sign">–</span><span class="bc-token">gas</span><span class="bc-amount">~-$2.10</span></div>
    <div class="balance-change in"><span class="bc-sign">+</span><span class="bc-token">${f.asset||'ETH'} (${f.toChain||'Base'})</span><span class="bc-amount">+${((f.amount||0.05)*0.9994).toFixed(4)}</span></div>`;
  }

  // allowance block
  let allowanceBlock='';
  if(!approval){
    allowanceBlock=`<div class="safety-item"><div class="safety-check ok">✓</div><div>native token — no allowance required</div></div>`;
  } else if(approved){
    allowanceBlock=`<div class="safety-item"><div class="safety-check ok">✓</div><div>allowance verified for ${asset}</div></div>`;
  } else {
    allowanceBlock=`<div class="safety-item"><div class="safety-check warn">!</div><div>${asset} allowance required for ${spender}</div></div>
    <div class="allowance-action">
      <button class="btn btn-primary btn-sm" onclick="doPermit2()">Sign Permit2 ✦ <span style="font-size:11px;opacity:0.7">(gasless)</span></button>
      <button class="btn btn-ghost btn-sm" onclick="doApprove()">Approve ${asset} on-chain</button>
    </div>`;
  }

  const simOutput=a==='swap'?`simulates cleanly · output ≈ ${((f.amount||0.1)*3120).toFixed(2)} ${f.assetOut||'USDC'}`:a==='lend'?`simulates cleanly · supply confirmed`:a==='borrow'?`simulates cleanly · health factor 2.14`:a==='earn'||a==='find-vault'?`simulates cleanly · best APY 6.1%`:`simulates cleanly · bridge confirmed`;

  return `<div class="ai-panel" id="aiCheckPanel">
  <div class="ai-panel-title">AI check · <span class="ai-live">live</span></div>
  <div class="ai-panel-sub">re-runs as you edit.</div>
  <div class="ai-section-label">EXPECTED BALANCE CHANGES</div>
  ${changes}
  <div class="ai-divider"></div>
  <div class="ai-section-label">ALLOWANCE & SAFETY</div>
  ${allowanceBlock}
  <div class="safety-item"><div class="safety-check ok">✓</div><div>contract verified · ${spenderFor(a)}</div></div>
  <div class="safety-item"><div class="safety-check ok">✓</div><div>${simOutput}</div></div>
</div>`;
}

function refreshAiCheck(){
  const panel=document.getElementById('aiCheckPanel');
  if(panel) panel.outerHTML=buildAiCheck(state.action,state.fields);
  // reattach
}

function doPermit2() {
  const asset=approvalAsset(state.action,state.fields);
  const spender=spenderFor(state.action);
  setAllowance(asset,spender);
  state.usedPermit2=true;
  const panel=document.getElementById('aiCheckPanel');
  if(panel) panel.outerHTML=buildAiCheck(state.action,state.fields);
}
function doApprove() {
  const btn=event.target;
  btn.disabled=true; btn.textContent='Approving…';
  setTimeout(()=>{
    const asset=approvalAsset(state.action,state.fields);
    setAllowance(asset,spenderFor(state.action));
    const panel=document.getElementById('aiCheckPanel');
    if(panel) panel.outerHTML=buildAiCheck(state.action,state.fields);
  },1800);
}

function onExecute(){
  lockStep(2);
  state.skipApproveStep = !needsApproval(state.action,state.fields) || state.usedPermit2;
  buildStep3();
}

/* ═══════════════════════════════════════════════════════════ STEP 03 ═══ */
function buildStep3() {
  const a=state.action;
  const skip=state.skipApproveStep;

  const stepsData = skip
    ? [
        {id:'xs1', title:'Pre-flight simulation',   sub:'eth_call against forked chain'},
        {id:'xs2', title:`Sign ${ACTION_META[a]?.label||a}`, sub:`EIP-1559 · ${!needsApproval(a,state.fields)?'native ETH, no approval needed':state.usedPermit2?'Permit2 signed — 1 tx only':'ERC-20 approval done'}` },
        {id:'xs3', title:'Broadcasting…',            sub:'in mempool'},
        {id:'xs4', title:'Confirmed',                sub:'1 confirmation · settled'},
      ]
    : [
        {id:'xs1', title:'Pre-flight simulation',   sub:'eth_call against forked chain'},
        {id:'xs2', title:`Approve ${approvalAsset(a,state.fields)}`, sub:`ERC-20 allowance for ${spenderFor(a)}`},
        {id:'xs3', title:`Sign ${ACTION_META[a]?.label||a}`, sub:'EIP-1559 · main transaction'},
        {id:'xs4', title:'Broadcasting…',            sub:'in mempool'},
        {id:'xs5', title:'Confirmed',                sub:'1 confirmation · settled'},
      ];

  const stepsHtml=stepsData.map((s,i)=>`
    <div class="exec-step" id="${s.id}">
      <div class="exec-icon">${i+1}</div>
      <div class="exec-info"><div class="exec-title">${s.title}</div><div class="exec-sub">${s.sub}</div></div>
      <div class="exec-status">queued</div>
    </div>`).join('');

  const html=`<div class="step-card" id="step3" style="position:relative">
  <div class="step-head">
    <span class="step-badge">STEP 03</span>
    <h2 class="step-title">execute</h2>
    <span class="step-status">in progress</span>
  </div>
  <p class="step-sub">native · ${skip?'1tx':'2tx'} · don't close the tab</p>
  <div class="step-body">
    <div class="exec-steps">${stepsHtml}</div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="startExecBtn" onclick="startExecution()">connect wallet &amp; execute</button>
      <button class="btn btn-ghost" style="margin-left:8px" onclick="unlockStep(2)">← back</button>
    </div>
  </div>
</div>`;
  appendStep(html,'step3');
  state.currentStep=3;
}

function startExecution() {
  if(state.txRunning) return;
  state.txRunning=true;
  document.getElementById('startExecBtn').disabled=true;
  const skip=state.skipApproveStep;
  const ids=skip?['xs1','xs2','xs3','xs4']:['xs1','xs2','xs3','xs4','xs5'];

  // Step xs1: pre-flight — auto done after 800ms
  activateExecStep('xs1');
  setTimeout(()=>{
    doneExecStep('xs1');
    // show signature modal for signing step
    const signId=skip?'xs2':'xs3';
    activateExecStep(ids[1]);
    showSigModal(skip?ids[1]:ids[1], ()=>{
      doneExecStep(ids[1]);
      if(!skip){
        // second signature (main tx)
        activateExecStep(ids[2]);
        setTimeout(()=>{
          showSigModal(ids[2],()=>{
            doneExecStep(ids[2]);
            runBroadcastAndConfirm(ids.slice(3));
          });
        },400);
      } else {
        runBroadcastAndConfirm(ids.slice(2));
      }
    });
  },1000);
}

function activateExecStep(id){
  const el=document.getElementById(id); if(!el)return;
  el.classList.add('active');
  el.querySelector('.exec-icon').textContent='·';
  el.querySelector('.exec-status').textContent=(id==='xs1')?'running':'awaiting signature';
}
function doneExecStep(id){
  const el=document.getElementById(id); if(!el)return;
  el.classList.remove('active'); el.classList.add('done');
  el.querySelector('.exec-icon').textContent='✓';
  el.querySelector('.exec-status').textContent='done';
}

function runBroadcastAndConfirm(ids){
  // broadcast
  const broadId=ids[0];
  const el=document.getElementById(broadId); if(el){el.classList.add('active');el.querySelector('.exec-status').textContent='in mempool';}
  setTimeout(()=>{
    if(el){el.classList.remove('active');el.classList.add('done');el.querySelector('.exec-icon').textContent='✓';el.querySelector('.exec-status').textContent='done';}
    // confirm
    const confId=ids[1];
    const ce=document.getElementById(confId); if(ce){ce.classList.add('active');ce.querySelector('.exec-status').textContent='1 confirmation';}
    setTimeout(()=>{
      if(ce){ce.classList.remove('active');ce.classList.add('done');ce.querySelector('.exec-icon').textContent='✓';ce.querySelector('.exec-status').textContent='done';}
      lockStep(3);
      setTimeout(()=>buildStep4(),800);
    },2000);
  },1500);
}

/* ── signature modal ── */
function showSigModal(stepId, onSign) {
  const a=state.action, f=state.fields;
  const isApproval=stepId.includes('xs2')&&!state.skipApproveStep;
  const txType=isApproval?`Approve ${approvalAsset(a,f)}`:(ACTION_META[a]?.label||a);
  const eipLine=needsApproval(a,f)&&!state.usedPermit2?'EIP-2612 · token approval':'EIP-1559 · native ETH swap';
  const toAddr=isApproval?`0x${approvalAsset(a,f)}Router`:`0xE592...1564 (${spenderFor(a).split(' ')[0]})`;

  const card=document.getElementById('step3');
  const backdrop=document.createElement('div');
  backdrop.className='modal-backdrop';
  backdrop.id='sigBackdrop';
  backdrop.innerHTML=`<div class="modal-card">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
      <div class="modal-title">signature request</div>
      <div class="modal-network">MetaMask · Sepolia</div>
    </div>
    <div class="modal-row"><span class="modal-key">ACTION</span><span class="modal-val">${txType}</span></div>
    <div class="modal-row"><span class="modal-key">TYPE</span><span class="modal-val">${eipLine}</span></div>
    <div class="modal-row"><span class="modal-key">FROM</span><span class="modal-val">0x7A4f3D...E9c2</span></div>
    <div class="modal-row"><span class="modal-key">TO</span><span class="modal-val">${toAddr}</span></div>
    <div class="modal-row"><span class="modal-key">EST. GAS</span><span class="modal-val">~$1.53</span></div>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="rejectSig()">reject</button>
      <button class="btn btn-primary" onclick="signTx()">sign →</button>
    </div>
  </div>`;
  card.appendChild(backdrop);
  window._onSignCb=onSign;
}

function signTx(){
  const b=document.getElementById('sigBackdrop');if(b)b.remove();
  if(window._onSignCb){window._onSignCb();window._onSignCb=null;}
}
function rejectSig(){
  const b=document.getElementById('sigBackdrop');if(b)b.remove();
  state.txRunning=false;
  document.getElementById('startExecBtn').disabled=false;
  // reset exec steps
  document.querySelectorAll('.exec-step').forEach(el=>{
    el.classList.remove('active','done');
    el.querySelector('.exec-icon').textContent=el.id.replace('xs','');
    el.querySelector('.exec-status').textContent='queued';
  });
}

/* ═══════════════════════════════════════════════════════════ STEP 04 ═══ */
function buildStep4() {
  const a=state.action, f=state.fields;
  const completeTitles={swap:'swap complete ✦',lend:'supply complete ✦',borrow:'borrow open ✦',earn:'vault position open ✦',bridge:'bridge complete ✦',['find-vault']:'vault found ✦'};
  const completeSubs={swap:`received ${((f.amount||0.1)*3120).toFixed(2)} ${f.assetOut||'USDC'} · want to put it to work?`,lend:`earning 4.2% APY on ${f.amount||100} ${f.asset||'USDC'} · want to compound?`,borrow:`${f.amount||0.05} ${f.asset||'ETH'} in your wallet · protect this position?`,earn:`deposited into Morpho at 6.1% APY · want to auto-compound?`,bridge:`${f.amount||0.05} ${f.asset||'ETH'} arrived on ${f.toChain||'Base'} · put it to work?`,['find-vault']:`deposited into best vault · want to auto-compound?`};
  const workflows=KEEPER_WORKFLOWS[a]||KEEPER_WORKFLOWS.earn;

  const summaryPaid=a==='swap'?`${f.amount||0.1} ${f.assetIn||'ETH'}`:a==='lend'||a==='earn'?`${f.amount||100} ${f.asset||'USDC'}`:a==='borrow'?`collateral locked`:a==='bridge'?`${f.amount||0.05} ${f.asset||'ETH'}`:f.amount||'—';
  const summaryReceived=a==='swap'?`${((f.amount||0.1)*3120).toFixed(2)} ${f.assetOut||'USDC'}`:a==='lend'?`${((f.amount||100)/22.4).toFixed(4)} cUSDC`:a==='borrow'?`${f.amount||0.05} ${f.asset||'ETH'}`:a==='earn'||a==='find-vault'?`vault shares`:a==='bridge'?`${((f.amount||0.05)*0.9994).toFixed(4)} ${f.asset||'ETH'}`:'-';
  const txHash='0x'+(Math.random().toString(16).slice(2)+Math.random().toString(16).slice(2)).slice(0,12)+'…';

  const wfGrid=workflows.map((w,i)=>`
    <div class="wf-card ${w.featured?'featured':''}" id="wf${i}">
      <div class="wf-kh-badge">KEEPERHUB</div>
      <div class="wf-title">${w.title}</div>
      <div class="wf-desc">${w.desc}</div>
      <div class="wf-btns">
        <button class="btn-wf-deploy" id="wfDeploy${i}" onclick="deployWf(${i})">${w.featured?'deploy →':'deploy →'}</button>
        <button class="btn-wf-custom">customize</button>
      </div>
    </div>`).join('');

  const html=`<div class="step-card" id="step4">
  <div class="step-head">
    <span class="step-badge">STEP 04</span>
    <h2 class="step-title">${completeTitles[a]||'complete ✦'}</h2>
    <span class="step-status">in progress</span>
  </div>
  <p class="step-sub">${completeSubs[a]||''}</p>
  <div class="step-body">
    <div class="step4-layout">
      <div>
        <div class="workflows-label">WORKFLOWS WE CAN DEPLOY</div>
        <div class="wf-grid">${wfGrid}</div>
        <div class="permission-banner" id="permBanner">
          <div class="perm-icon">🔑</div>
          <div class="perm-text">
            <strong>one-time permission needed</strong>
            <span>deploying a workflow needs a session-key signature so the keeper can act within strict limits. revoke any time.</span>
          </div>
          <button class="btn btn-primary btn-sm" onclick="grantPerm()">grant access</button>
        </div>
        <div id="permGranted" style="display:none" class="safety-item" style="margin-top:8px">
          <div class="safety-check ok">✓</div><div>access granted · keeper ready to deploy</div>
        </div>
      </div>
      <div>
        <div class="summary-panel">
          <div class="summary-title">summary</div>
          <div class="summary-sub">your wish, fulfilled.</div>
          <div class="summary-row"><span class="summary-key">ACTION</span><span class="summary-val">${a}</span></div>
          <div class="summary-row"><span class="summary-key">PAID</span><span class="summary-val">${summaryPaid}</span></div>
          <div class="summary-row"><span class="summary-key">RECEIVED</span><span class="summary-val">${summaryReceived}</span></div>
          <div class="summary-row"><span class="summary-key">GAS</span><span class="summary-val">$1.53</span></div>
          <div class="summary-row"><span class="summary-key">PATH</span><span class="summary-val">${!needsApproval(a,f)||state.usedPermit2?'native · 1tx':'erc20 · 2tx'}</span></div>
          <div class="summary-row"><span class="summary-key">TX</span><span class="summary-val"><a href="#" class="tx-link">${txHash} ↗</a></span></div>
          <button class="btn btn-primary btn-full" style="margin-top:8px" onclick="startOver()">make another wish</button>
          <button class="btn btn-ghost btn-full" style="margin-top:8px;border-color:var(--rule)">view portfolio</button>
        </div>
      </div>
    </div>
  </div>
</div>`;
  appendStep(html,'step4');
  state.currentStep=4;
}

function grantPerm(){
  state.permissionGranted=true;
  document.getElementById('permBanner').style.display='none';
  document.getElementById('permGranted').style.display='flex';
}

function deployWf(i){
  const btn=document.getElementById('wfDeploy'+i);
  if(!state.permissionGranted){ grantPerm(); }
  if(btn){ btn.textContent='deploying…'; btn.disabled=true; }
  setTimeout(()=>{
    if(btn){ btn.textContent='deployed ✓'; btn.classList.add('deployed'); }
  },1200);
}

function startOver(){
  // remove all steps
  for(let i=1;i<=4;i++){const c=document.getElementById('step'+i);if(c)c.remove();}
  // reset state
  state.action=''; state.fields={}; state.currentStep=0;
  state.usedPermit2=false; state.skipApproveStep=false;
  state.txRunning=false; state.permissionGranted=false;
  localStorage.removeItem('w_intent');
  appendStep(buildStep1(),'step1');
  state.currentStep=1;
}

/* ═══════════════════════════════════════════════════════════ PERSIST ═══ */
function saveState(){
  try { localStorage.setItem('w_intent',JSON.stringify({action:state.action,fields:state.fields})); } catch(e){}
}

/* ═══════════════════════════════════════════════════════════ INIT ═══ */
(function init(){
  const container=document.getElementById('stepsContainer');
  container.innerHTML=buildStep1();
  state.currentStep=1;

  // restore saved intent
  try {
    const s=JSON.parse(localStorage.getItem('w_intent')||'{}');
    if(s.action && ACTION_META[s.action]){
      state.action=s.action; state.fields=s.fields||{};
      const t=document.getElementById('actionTrigger');
      if(t){t.classList.remove('empty');document.getElementById('actionLabel').textContent=ACTION_META[s.action].label;}
      renderDynamicFields();
    }
  } catch(e){}
})();
</script>
</body>
</html>
